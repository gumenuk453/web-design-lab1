<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyContacts - Реєстрація</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MyContacts</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="myMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-person-plus fs-2"></i>
                            </div>
                            <h3 class="fw-bold">Створення акаунту</h3>
                            <p class="text-muted">Заповніть форму, щоб почати користуватися довідником</p>
                        </div>

                        <form action="profile.html">
                            <div class="mb-3">
                                <label for="nameInput" class="form-label fw-semibold">Повне ім'я (ПІБ)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="nameInput" placeholder="Коваленко Андрій Миколайович" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="emailInput" class="form-label fw-semibold">Електронна пошта</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="birthDateInput" class="form-label fw-semibold">Дата народження</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" class="form-control" id="birthDateInput" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold d-block">Стать</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="genderOptions" id="genderMale" value="male" checked>
                                    <label class="form-check-label" for="genderMale">Чоловіча</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="genderOptions" id="genderFemale" value="female">
                                    <label class="form-check-label" for="genderFemale">Жіноча</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="passwordInput" class="form-label fw-semibold">Пароль</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="passwordInput" placeholder="Придумайте пароль" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPasswordInput" class="form-label fw-semibold">Підтвердження паролю</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Повторіть пароль" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                                    <label class="form-check-label text-muted small" for="termsCheck">
                                        Я погоджуюсь з умовами використання сервісу
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                                Зареєструватися <i class="bi bi-check-circle ms-1"></i>
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Вже маєте акаунт? <a href="login.html" class="text-primary fw-bold text-decoration-none">Увійти</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 MyContacts. Всі права захищені.</p>
            <small class="text-secondary">Лабораторна робота №1. Web-дизайн.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
